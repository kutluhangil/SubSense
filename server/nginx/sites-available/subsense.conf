# SubSense — Nginx site config (Local Network / HTTP)
# For LAN access via IP — no SSL needed
# When a domain + SSL is ready, see subsense.conf.ssl.example

server {
    listen 80;
    listen [::]:80;
    server_name _;  # catch-all: matches IP and any hostname

    # ── Frontend (Vite SPA) ───────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── API (future backend service) ─────────────────────────────────────
    # Uncomment when you add a backend:
    # location /api/ {
    #     proxy_pass http://backend:4000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ── Static asset caching ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
